name: JKK Radar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager selenium-stealth requests geopy

      - name: Run Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/scraper.py

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_artifacts/
          if-no-files-found: ignore

      - name: Commit and Push if changes
        run: |
          if [ -f seen_apartments.json ] || [ -f geocache.json ] || [ -f results.json ] || [ -f notifications.json ] || [ -f telegram_offset.txt ] || [ -f last_digest.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_apartments.json geocache.json results.json notifications.json telegram_offset.txt last_digest.txt 2>/dev/null || true
            if ! git diff --staged --quiet; then
              git commit -m "Update data files"
              git push
            else
              echo "No changes to commit."
            fi
          else
            echo "No data files generated, skipping commit."
          fi
