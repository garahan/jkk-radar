<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0E1C">
<title>JKK Radar — Tokyo Apartments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<style>
  :root{
    --bg:#0D0E1C; --surface:#15172A; --card:#1C1F38; --line:#2A2E52;
    --text:#F2F1FA; --muted:#8A8DA8; --faint:#5A5D7A;
    --accent:#4DD6C1; --accent2:#9D7BFF; --warm:#FFB547; --hot:#FF5D5D;
    --green:#3FB950; --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;}
  body{max-width:680px;margin:0 auto;padding:16px 16px 40px;
    background:
      radial-gradient(900px 420px at 80% -10%, rgba(77,214,193,.10), transparent 60%),
      radial-gradient(700px 380px at 0% 8%, rgba(157,123,255,.08), transparent 60%),
      var(--bg);}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* HEADER */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .header h1{font-size:22px;margin:0;font-weight:700;}
  .header h1 span{color:var(--accent);}
  .header .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  .header .live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

  /* STATS ROW */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
  .stat b{font-family:'JetBrains Mono',monospace;font-size:24px;display:block;color:var(--accent);}
  .stat span{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

  /* SORT BAR */
  .sortbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .sortbar button{background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:8px 16px;
    font-size:13px;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
  .sortbar button.active{background:var(--accent);color:#0D0E1C;border-color:var(--accent);font-weight:600;}
  .sortbar button:hover{border-color:var(--accent);}

  /* CARDS */
  .cards{display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;transition:border-color .25s;position:relative;overflow:hidden;}
  .card:hover{border-color:var(--accent);}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .card .info{flex:1;min-width:0;}
  .card h3{margin:0 0 4px;font-size:16px;font-weight:700;line-height:1.3;}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .card .tag{font-size:11px;padding:4px 10px;border-radius:99px;background:var(--surface);border:1px solid var(--line);
    color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .card .tag.dist{color:var(--accent);border-color:rgba(77,214,193,.3);}
  .card .tag.price{color:var(--warm);border-color:rgba(255,181,71,.3);}
  .card .tag.layout{color:var(--accent2);border-color:rgba(157,123,255,.3);}
  .card .tag.train{color:var(--accent2);border-color:rgba(157,123,255,.3);}
  .card .tag.affordable{color:var(--green);border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.08);}
  .card .tag.over{color:var(--hot);border-color:rgba(255,93,93,.2);opacity:.6;}
  .card .tag.source-jkk{color:var(--accent);border-color:rgba(77,214,193,.3);background:rgba(77,214,193,.05);}
  .card .tag.source-ur{color:#B5179E;border-color:rgba(181,23,158,.3);background:rgba(181,23,158,.05);}
  .card .maplink{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;}
  .card .maplink:hover{text-decoration:underline;}
  .card.notaffordable{opacity:.6;}

  /* TRANSIT TIMELINE */
  .transit{margin-top:12px;background:var(--surface);border-radius:12px;padding:12px;}
  .transit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .transit-header .tlabel{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
  .transit-header .ttotal{font-size:13px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;}
  .transit-header .tsrc{font-size:9px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  .transit-steps{display:flex;align-items:center;gap:0;flex-wrap:wrap;}
  .tstep{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .tstep .ticon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .tstep .ticon.walk{background:rgba(138,141,168,.15);}
  .tstep .ticon.train{background:rgba(77,214,193,.15);}
  .tstep .ticon.bus{background:rgba(255,181,71,.15);}
  .tstep .ticon.subway{background:rgba(157,123,255,.15);}
  .tstep .tdur{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .tstep .tname{font-size:8px;color:var(--faint);max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tarrow{color:var(--faint);font-size:12px;margin:0 2px;align-self:center;margin-top:-8px;}
  .transit-detail{margin-top:8px;font-size:10px;color:var(--muted);line-height:1.5;}
  .transit-detail .tdline{display:flex;align-items:center;gap:4px;padding:2px 0;}
  .transit-detail .tdline .tdicon{font-size:12px;}
  .transit-detail .tdline .tddur{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;}
  .transit-detail .tdline .tdinfo{color:var(--faint);font-size:9px;}
  .card .matchstars{font-size:14px;letter-spacing:1px;margin-bottom:2px;}
  .card .matchscore{font-size:10px;color:var(--faint);font-family:'JetBrains Mono',monospace;margin-left:4px;}
  .card .matchrow{display:flex;align-items:center;gap:2px;margin-bottom:4px;}
  .card .star{position:absolute;top:12px;right:12px;cursor:pointer;font-size:18px;color:var(--faint);transition:all .2s;user-select:none;z-index:2;background:none;border:none;padding:0;}
  .card .star:hover{color:var(--warm);transform:scale(1.2);}
  .card .star.active{color:var(--warm);text-shadow:0 0 8px rgba(255,181,71,.5);}
  .card.fav{border-color:var(--warm);box-shadow:0 0 12px rgba(255,181,71,.1);}
  .card .pricebig.over{color:var(--hot);}
  .card .pricebig{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--warm);white-space:nowrap;}
  .card .pricebig small{font-size:11px;color:var(--faint);font-weight:400;}
  .card .pricebig-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}

  /* DISTANCE BAR */
  .distbar{margin-top:12px;height:6px;border-radius:99px;background:var(--surface);overflow:hidden;}
  .distbar .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s;}

  /* EMPTY / LOADING */
  .empty{text-align:center;padding:60px 20px;color:var(--faint);}
  .empty .icon{font-size:48px;display:block;margin-bottom:12px;}
  .empty p{font-size:14px;line-height:1.6;}

  /* NOTIFICATION HISTORY */
  .notif-section{margin-top:24px;border-top:1px solid var(--line);padding-top:20px;}
  .notif-section h2{font-size:14px;color:var(--muted);margin:0 0 12px;font-weight:600;letter-spacing:.05em;}
  .notif-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .notif-item .ntime{font-size:10px;color:var(--faint);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
  .notif-item .nstats{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .notif-item .napt{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;}
  .notif-item .napt .nname{color:var(--text);font-weight:500;}
  .notif-item .napt .nprice{color:var(--warm);font-family:'JetBrains Mono',monospace;font-size:11px;}
  .notif-item .napt a{color:var(--accent);text-decoration:none;font-size:10px;margin-left:8px;}
  .notif-empty{color:var(--faint);font-size:13px;text-align:center;padding:20px;}

  /* FOOTER */
  footer{margin-top:30px;text-align:center;font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  footer a{color:var(--accent);text-decoration:none;}

  /* LAST UPDATED */
  .updated{font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;margin-bottom:16px;}
  .header .trigger{background:var(--accent);color:#0D0E1C;border:none;border-radius:99px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
  .header .trigger:hover{box-shadow:0 0 16px rgba(77,214,193,.4);}
  .header .trigger:disabled{opacity:.5;cursor:wait;}
  .header .toggle{background:var(--surface);color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;}
  .header .toggle:hover{border-color:var(--hot);}
  .header .toggle.on{color:var(--green);border-color:rgba(63,185,80,.4);}
  .header .toggle.off{color:var(--hot);border-color:rgba(255,93,93,.4);}
  .header .toggle .switch{width:32px;height:18px;border-radius:99px;background:var(--line);position:relative;transition:background .2s;}
  .header .toggle .switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text);transition:transform .2s;}
  .header .toggle.on .switch{background:var(--green);}
  .header .toggle.on .switch::after{transform:translateX(14px);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.err{border-color:var(--hot);}

  /* TABS */
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tabs button{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
  .tabs button.active{background:var(--accent);color:#0D0E1C;border-color:var(--accent);font-weight:600;}

  /* FILTERS */
  .filters{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px;}
  .filters summary{cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;user-select:none;}
  .filters .fbody{margin-top:12px;display:flex;flex-direction:column;gap:12px;}
  .filters label{font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
  .filters input[type=range]{width:100%;accent-color:var(--accent);}
  .filters select{background:var(--surface);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:6px 10px;font-size:13px;font-family:'Space Grotesk',sans-serif;}
  .filters .frow{display:flex;gap:12px;flex-wrap:wrap;}
  .filters .frow>div{flex:1;min-width:140px;}
  .filters .fval{font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
  .filters .toggle-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;}
  .filters .toggle-chip input{accent-color:var(--green);}

  /* MAP */
  #map{height:500px;border-radius:var(--r);border:1px solid var(--line);margin-bottom:16px;}
  .leaflet-popup-content{font-family:'Space Grotesk',sans-serif;font-size:12px;}
  .leaflet-popup-content b{color:var(--accent2);}
  .leaflet-popup-content a{color:var(--accent);}
  .map-popup{min-width:200px;}
  .map-popup .mp-name{font-size:14px;font-weight:700;margin-bottom:4px;}
  .map-popup .mp-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0;}
  .map-popup .mp-tag{font-size:10px;padding:2px 6px;border-radius:99px;background:#1C1F38;border:1px solid #2A2E52;color:#8A8DA8;}
  .map-popup .mp-link{margin-top:6px;font-size:11px;}

  .header .trigger{background:var(--accent);color:#0D0E1C;border:none;border-radius:99px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}
  .header .trigger:hover{box-shadow:0 0 16px rgba(77,214,193,.4);}
</style>
</head>
<body>

<div class="header">
  <h1>JKK <span>Radar</span></h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="trigger" id="triggerBtn" href="https://github.com/garahan/jkk-radar/actions/workflows/scrape.yml" target="_blank" style="text-decoration:none;">⚡ Scan Now</a>
    <button class="toggle on" id="toggleBtn" onclick="toggleRadar()"><span class="switch"></span><span id="toggleLabel">ON</span></button>
    <div class="live"><div class="dot"></div> LIVE</div>
  </div>
</div>

<div class="updated" id="updated"></div>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="active" id="tabList" onclick="switchTab('list')">📋 List View</button>
  <button id="tabMap" onclick="switchTab('map')">🗺️ Map View</button>
</div>

<details class="filters">
  <summary>⚙️ Filters</summary>
  <div class="fbody">
    <div class="frow">
      <div>
        <label>Max Rent: <span class="fval" id="rentVal">¥80,000</span></label>
        <input type="range" id="rentFilter" min="10000" max="300000" step="5000" value="80000" oninput="updateFilters()">
      </div>
      <div>
        <label>Max Distance: <span class="fval" id="distVal">50km</span></label>
        <input type="range" id="distFilter" min="1" max="50" step="1" value="50" oninput="updateFilters()">
      </div>
    </div>
    <div class="frow">
      <div>
        <label>Ward / Area</label>
        <select id="wardFilter" onchange="updateFilters()"><option value="">All wards</option></select>
      </div>
      <div>
        <label>Floor Plan</label>
        <select id="planFilter" onchange="updateFilters()"><option value="">All layouts</option></select>
      </div>
    </div>
    <label class="toggle-chip"><input type="checkbox" id="affordableOnly" onchange="updateFilters()"> Show affordable only (≤¥80k)</label>
    <div class="frow">
      <div>
        <label>Source</label>
        <select id="sourceFilter" onchange="updateFilters()">
          <option value="">All sources</option>
          <option value="JKK">JKK only</option>
          <option value="UR">UR only</option>
        </select>
      </div>
    </div>
  </div>
</details>

<div class="sortbar">
  <button class="active" data-sort="match">⭐ Best Match</button>
  <button data-sort="distance">📏 Distance</button>
  <button data-sort="price">💰 Price</button>
  <button data-sort="area">📍 Area</button>
  <button data-sort="size">📐 Size</button>
</div>

<div id="listView">
  <div class="cards" id="cards"></div>
</div>

<div id="mapView" style="display:none;">
  <div id="map"></div>
</div>

<div class="notif-section">
  <h2>📬 NOTIFICATION HISTORY</h2>
  <div id="notifs"><div class="notif-empty">Loading history...</div></div>
</div>

<footer>JKK Radar · <a href="https://github.com/garahan/jkk-radar">Source</a> · Updates every 15 min</footer>
<div class="toast" id="toast"></div>


<script>
let DATA=null, currentSort='match', currentTab='list';
let mapInstance=null, markerCluster=null;
let activeFilters={rentMax:80000, distMax:50, ward:'', plan:'', affordableOnly:false, source:''};
let radarOn=true, autoRefreshTimer=null, notifTimer=null, mapNeedsUpdate=false, filtersPopulated=false;

function showToast(msg, isErr){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(isErr?' err':'');
  setTimeout(()=>t.className='toast'+(isErr?' err':''),4000);
}

function debounce(fn, ms){
  let t=null;
  return function(...args){clearTimeout(t);t=setTimeout(()=>fn.apply(this,args),ms);};
}

// --- TOGGLE (local auto-refresh) ---
function toggleRadar(){
  const btn=document.getElementById('toggleBtn');
  const label=document.getElementById('toggleLabel');
  radarOn=!radarOn;
  localStorage.setItem('radar_on',radarOn?'1':'0');
  btn.className='toggle '+(radarOn?'on':'off');
  label.textContent=radarOn?'ON':'OFF';
  if(radarOn){
    startAutoRefresh();
    showToast('✅ Auto-refresh ON — updates every 60s');
  }else{
    stopAutoRefresh();
    showToast('⏸ Auto-refresh paused');
  }
}

function startAutoRefresh(){
  stopAutoRefresh();
  autoRefreshTimer=setInterval(loadData,60000);
  notifTimer=setInterval(loadNotifs,120000);
}
function stopAutoRefresh(){
  if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null;}
  if(notifTimer){clearInterval(notifTimer);notifTimer=null;}
}

// --- DATA LOADING ---
async function loadData(){
  try{
    const r=await fetch('results.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA=await r.json();
    render();
  }catch(e){
    document.getElementById('cards').innerHTML=
      '<div class="empty"><span class="icon">📡</span><p>Waiting for first scan...<br>The scraper runs every 15 minutes.<br>Results will appear here automatically.</p></div>';
  }
}

function formatPrice(p){return '\u00a5'+p.toLocaleString();}

function timeAgo(iso){
  if(!iso) return '';
  const d=new Date(iso), now=new Date();
  const mins=Math.floor((now-d)/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+' min ago';
  const hrs=Math.floor(mins/60);
  if(hrs<24) return hrs+' hr ago';
  return Math.floor(hrs/24)+' days ago';
}

// --- FILTERING ---
function getFiltered(){
  if(!DATA||!DATA.apartments) return [];
  return DATA.apartments.filter(a=>{
    if(activeFilters.affordableOnly && !a.affordable) return false;
    if(a.price > activeFilters.rentMax) return false;
    if(a.distance_km!=null && a.distance_km > activeFilters.distMax) return false;
    if(activeFilters.ward && a.area !== activeFilters.ward) return false;
    if(activeFilters.plan && a.layout !== activeFilters.plan) return false;
    if(activeFilters.source && (a.source||'JKK') !== activeFilters.source) return false;
    return true;
  });
}

const updateFiltersDebounced=debounce(function(){
  activeFilters.rentMax=parseInt(document.getElementById('rentFilter').value);
  activeFilters.distMax=parseInt(document.getElementById('distFilter').value);
  activeFilters.ward=document.getElementById('wardFilter').value;
  activeFilters.plan=document.getElementById('planFilter').value;
  activeFilters.affordableOnly=document.getElementById('affordableOnly').checked;
  activeFilters.source=document.getElementById('sourceFilter').value;
  render();
  if(currentTab==='map') scheduleMapUpdate();
},120);

function updateFilters(){
  document.getElementById('rentVal').textContent='\u00a5'+parseInt(document.getElementById('rentFilter').value).toLocaleString();
  document.getElementById('distVal').textContent=document.getElementById('distFilter').value+'km';
  updateFiltersDebounced();
}

// --- TABS ---
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabList').classList.toggle('active',tab==='list');
  document.getElementById('tabMap').classList.toggle('active',tab==='map');
  document.getElementById('listView').style.display=tab==='list'?'':'none';
  document.getElementById('mapView').style.display=tab==='map'?'':'none';
  if(tab==='map') setTimeout(()=>{renderMap();},50);
}

// --- MAP (optimized) ---
function scheduleMapUpdate(){
  if(currentTab!=='map') return;
  if(mapNeedsUpdate) return;
  mapNeedsUpdate=true;
  requestAnimationFrame(()=>{mapNeedsUpdate=false;renderMap();});
}

function renderMap(){
  if(!DATA||!DATA.apartments) return;
  const apts=getFiltered().filter(a=>a.lat && a.lon);
  if(!apts.length) return;

  if(!mapInstance){
    mapInstance=L.map('map',{zoomControl:true,preferCanvas:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'\u00a9 OpenStreetMap',maxZoom:19
    }).addTo(mapInstance);
    markerCluster=L.markerClusterGroup({
      maxClusterRadius:60,showCoverageOnHover:false,
      chunkedLoading:true,spiderfyOnMaxZoom:true
    });
    mapInstance.addLayer(markerCluster);
  } else {
    markerCluster.clearLayers();
  }

  const markers=apts.map(a=>{
    const color=(a.source||'JKK')==='UR'?'#B5179E':(a.affordable?'#4DD6C1':'#FF5D5D');
    const score=a.match_score||0;
    const marker=L.circleMarker([a.lat,a.lon],{
      radius:Math.max(8,Math.min(16,8+(parseFloat(a.floor_area)||0)/20)),
      fillColor:color,color:'#2A2E52',weight:2,opacity:.9,fillOpacity:.75
    });
    const popup=`<div class="map-popup">
      <div class="mp-name">${a.name}</div>
      <div class="mp-tags">
        <span class="mp-tag">${a.source||'JKK'}</span>
        <span class="mp-tag">\ud83d\udccd ${a.area}</span>
        <span class="mp-tag">\ud83c\udfe0 ${a.layout}</span>
        <span class="mp-tag">\ud83d\udccf ${a.floor_area}m\u00b2</span>
        ${a.distance_km!=null?`<span class="mp-tag">\ud83d\udccf ${a.distance_km}km</span>`:''}
        ${a.train_min?`<span class="mp-tag">\ud83d\ude87 ~${a.train_min}min</span>`:''}
      </div>
      <div style="font-size:14px;font-weight:700;color:#FFB547;">\u00a5${a.price.toLocaleString()}/mo</div>
      <div style="font-size:11px;color:#8A8DA8;margin-top:4px;">${'\u2b50'.repeat(Math.floor(score))}${score%1>=0.5?'\u00bd':''} ${score.toFixed(1)}/5 match</div>
      ${(a.transit_steps||[]).length?`<div style="margin-top:6px;font-size:10px;color:#8A8DA8;line-height:1.4;">${a.transit_steps.map(s=>{const ic=s.mode==='walk'?'\ud83d\udeb6':(s.vehicle==='bus'?'\ud83d\ude8c':'\ud83d\ude86');return ic+' '+s.duration_min+'m';}).join(' \u2192 ')}</div>`:''}
      ${a.maps_url?`<div class="mp-link"><a href="${a.maps_url}" target="_blank">\ud83d\uddfa Google Maps</a></div>`:''}
    </div>`;
    marker.bindPopup(popup,{maxWidth:300});
    marker.on('mouseover',function(){marker.openPopup();});
    marker.on('mouseout',function(){if(!marker.isPopupOpen())marker.closePopup();});
    return marker;
  });

  markerCluster.addLayers(markers);

  const bounds=L.latLngBounds(apts.map(a=>[a.lat,a.lon]));
  mapInstance.fitBounds(bounds,{padding:[40,40]});
}

// --- RENDER ---
function render(){
  if(!DATA||!DATA.apartments||!DATA.apartments.length){
    document.getElementById('cards').innerHTML=
      '<div class="empty"><span class="icon">\ud83d\udd0d</span><p>No apartments found in the last scan.</p></div>';
    return;
  }

  document.getElementById('updated').textContent='Last scan: '+timeAgo(DATA.last_updated)+' \u00b7 '+DATA.total+' listings \u00b7 '+DATA.affordable_count+' under \u00a5'+((DATA.max_rent||80000)/1000)+'k';

  if(!filtersPopulated){
    const wards=[...new Set(DATA.apartments.map(a=>a.area))].sort();
    const plans=[...new Set(DATA.apartments.map(a=>a.layout))].sort();
    const wardSel=document.getElementById('wardFilter');
    const planSel=document.getElementById('planFilter');
    wards.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;wardSel.appendChild(o);});
    plans.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;planSel.appendChild(o);});
    filtersPopulated=true;
  }

  const apts=DATA.apartments;
  const affordable=apts.filter(a=>a.affordable);
  const jkkCount=apts.filter(a=>(a.source||'JKK')==='JKK').length;
  const urCount=apts.filter(a=>a.source==='UR').length;

  document.getElementById('stats').innerHTML=`
    <div class="stat"><b>${apts.length}</b><span>Listings</span></div>
    <div class="stat"><b>${affordable.length}</b><span>Under \u00a580k</span></div>
    <div class="stat"><b>${jkkCount}J / ${urCount}U</b><span>JKK / UR</span></div>
  `;

  const filtered=getFiltered();
  let sorted=[...filtered];
  if(currentSort==='match') sorted.sort((a,b)=>(b.match_score||0)-(a.match_score||0));
  else if(currentSort==='distance') sorted.sort((a,b)=>(a.distance_km??999)-(b.distance_km??999));
  else if(currentSort==='price') sorted.sort((a,b)=>a.price-b.price);
  else if(currentSort==='area') sorted.sort((a,b)=>a.area.localeCompare(b.area));
  else if(currentSort==='size') sorted.sort((a,b)=>(parseFloat(b.floor_area)||0)-(parseFloat(a.floor_area)||0));
  sorted.sort((a,b)=>(isFav(b.uid)?1:0)-(isFav(a.uid)?1:0));

  const maxDist=50;
  const el=document.getElementById('cards');
  if(!sorted.length){
    el.innerHTML='<div class="empty"><span class="icon">\ud83d\udd0d</span><p>No apartments match your filters.</p></div>';
    return;
  }
  el.innerHTML=sorted.map(a=>{
    const distPct=a.distance_km!=null?Math.min(100,(a.distance_km/maxDist)*100):0;
    const overClass=a.affordable?'':' notaffordable';
    const priceClass=a.affordable?'':' over';
    const favClass=isFav(a.uid)?' fav':'';
    const starClass=isFav(a.uid)?' active':'';
    const score=a.match_score||0;
    const fullStars=Math.floor(score);
    const halfStar=score%1>=0.5;
    return `<div class="card${overClass}${favClass}">
      <button class="star${starClass}" onclick="toggleFav('${a.uid}')">\u2605</button>
      <div class="top">
        <div class="info">
          <div class="matchrow">
            <span class="matchstars">${'\u2b50'.repeat(fullStars)}${halfStar?'\u00bd':''}</span>
            <span class="matchscore">${score.toFixed(1)}/5 match</span>
          </div>
          <h3>${a.name}</h3>
          <div class="meta">
            <span class="tag area">\ud83d\udccd ${a.area}</span>
            <span class="tag layout">\ud83c\udfe0 ${a.layout}</span>
            <span class="tag">\ud83d\udccf ${a.floor_area}m\u00b2</span>
            ${a.distance_km!=null?`<span class="tag dist">\ud83d\udccf ${a.distance_km}km</span>`:''}
            ${a.train_min?`<span class="tag train">\ud83d\ude87 ~${a.train_min}min</span>`:''}
            ${a.affordable?`<span class="tag affordable">\u2713 \u2264\u00a580k</span>`:`<span class="tag over">over \u00a580k</span>`}
            <span class="tag ${(a.source||'JKK')==='JKK'?'source-jkk':'source-ur'}">${a.source||'JKK'}</span>
          </div>
        </div>
        <div class="pricebig-wrap">
          <div class="pricebig${priceClass}">${formatPrice(a.price)}<small>/mo</small></div>
        </div>
      </div>
      ${a.distance_km!=null?`<div class="distbar"><div class="fill" style="width:${distPct}%"></div></div>`:''}
      ${renderTransit(a)}
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
        ${a.maps_url?`<a class="maplink" href="${a.maps_url}" target="_blank">\ud83d\uddfa\ufe0f Google Maps</a>`:''}
        ${a.detail_url?`<a class="maplink" href="${a.detail_url}" target="_blank">\ud83d\udccc Listing Detail</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderTransit(a){
  const steps=a.transit_steps||[];
  const src=a.transit_source||'estimated';
  if(!a.train_min) return '';

  if(!steps.length){
    return `<div class="transit">
      <div class="transit-header">
        <span class="tlabel">\ud83d\ude87 Commute to Shinjuku</span>
        <span class="ttotal">~${a.train_min}min</span>
      </div>
      <div class="transit-detail"><span class="tsrc">\u26a0\ufe0f Estimated (no API key)</span></div>
    </div>`;
  }

  const vehicleIcons={train:'\ud83d\ude86',subway:'\ud83d\ude87',bus:'\ud83d\ude8c',walk:'\ud83d\udeb6'};

  const timelineHtml=steps.map((s,i)=>{
    const icon=s.mode==='walk'?'\ud83d\udeb6':(vehicleIcons[s.vehicle]||'\ud83d\ude86');
    const cls=s.mode==='walk'?'walk':(s.vehicle||'train');
    const name=s.line?s.line:(s.mode==='walk'?'Walk':'Transit');
    return `<div class="tstep">
      <div class="ticon ${cls}">${icon}</div>
      <div class="tdur">${s.duration_min}m</div>
      <div class="tname">${name}</div>
    </div>${i<steps.length-1?'<span class="tarrow">\u2192</span>':''}`;
  }).join('');

  const detailHtml=steps.map(s=>{
    const icon=s.mode==='walk'?'\ud83d\udeb6':(vehicleIcons[s.vehicle]||'\ud83d\ude86');
    let info='';
    if(s.mode==='walk'){
      info=s.instruction||'Walk';
    } else {
      info=`${s.line||''} ${s.headsign?'\u2192 '+s.headsign:''} ${s.num_stops?s.num_stops+' stops':''}`;
    }
    return `<div class="tdline">
      <span class="tdicon">${icon}</span>
      <span class="tddur">${s.duration_min}min</span>
      <span class="tdinfo">${info}</span>
    </div>`;
  }).join('');

  const transfers=steps.filter(s=>s.mode==='transit').length-1;
  const transferTxt=transfers>0?`${transfers} transfer${transfers>1?'s':''}`:'direct';

  return `<div class="transit">
    <div class="transit-header">
      <span class="tlabel">\ud83d\ude87 Commute to Shinjuku (arrive 9:45)</span>
      <span class="ttotal">${a.train_min}min</span>
    </div>
    <div class="transit-steps">${timelineHtml}</div>
    <div class="transit-detail">${detailHtml}</div>
    <div style="margin-top:6px;font-size:9px;color:var(--faint);font-family:'JetBrains Mono',monospace;">${transferTxt} \u00b7 source: ${src}</div>
  </div>`;
}

// --- SORT BUTTONS ---
document.querySelectorAll('.sortbar button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.sortbar button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentSort=b.dataset.sort;
    render();
  });
});

// --- INIT ---
radarOn=localStorage.getItem('radar_on')!=='0';
{
  const btn=document.getElementById('toggleBtn');
  const label=document.getElementById('toggleLabel');
  btn.className='toggle '+(radarOn?'on':'off');
  label.textContent=radarOn?'ON':'OFF';
}

loadData();
loadNotifs();
if(radarOn) startAutoRefresh();

// --- FAVORITES ---
function getFavs(){try{return JSON.parse(localStorage.getItem('jkk_favs')||'[]');}catch(e){return[];}}
function isFav(uid){return getFavs().includes(uid);}
function toggleFav(uid){
  let favs=getFavs();
  if(favs.includes(uid)) favs=favs.filter(f=>f!==uid);
  else favs.push(uid);
  localStorage.setItem('jkk_favs',JSON.stringify(favs));
  render();
}

// --- NOTIFICATION HISTORY ---
async function loadNotifs(){
  try{
    const r=await fetch('notifications.json?_='+Date.now());
    if(!r.ok) throw new Error();
    const data=await r.json();
    renderNotifs(data);
  }catch(e){
    document.getElementById('notifs').innerHTML='<div class="notif-empty">No notifications yet.</div>';
  }
}

function renderNotifs(history){
  if(!history||!history.length){
    document.getElementById('notifs').innerHTML='<div class="notif-empty">No notifications sent yet.</div>';
    return;
  }
  const el=document.getElementById('notifs');
  el.innerHTML=history.slice().reverse().map(n=>{
    const t=timeAgo(n.timestamp);
    const aptsHtml=(n.alerted||[]).map(a=>
      `<div class="napt">
        <span class="nname">${a.name} <span style="color:var(--faint)">${a.area||''}</span></span>
        <span style="display:flex;align-items:center;gap:6px;">
          <span class="nprice">\u00a5${(a.price||0).toLocaleString()}</span>
          ${a.maps_url?`<a href="${a.maps_url}" target="_blank">\ud83d\uddfa</a>`:''}
        </span>
      </div>`
    ).join('');
    return `<div class="notif-item">
      <div class="ntime">${t} \u00b7 ${new Date(n.timestamp).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      <div class="nstats">Scanned ${n.total_scanned} \u00b7 ${n.new_count} new \u00b7 Alerted ${n.alerted?.length||0}</div>
      ${aptsHtml}
    </div>`;
  }).join('');
}
</script>
