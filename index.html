<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0E1C">
<title>JKK Radar — Tokyo Apartments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D0E1C; --surface:#15172A; --card:#1C1F38; --line:#2A2E52;
    --text:#F2F1FA; --muted:#8A8DA8; --faint:#5A5D7A;
    --accent:#4DD6C1; --accent2:#9D7BFF; --warm:#FFB547; --hot:#FF5D5D;
    --green:#3FB950; --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;}
  body{max-width:680px;margin:0 auto;padding:16px 16px 40px;
    background:
      radial-gradient(900px 420px at 80% -10%, rgba(77,214,193,.10), transparent 60%),
      radial-gradient(700px 380px at 0% 8%, rgba(157,123,255,.08), transparent 60%),
      var(--bg);}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* HEADER */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .header h1{font-size:22px;margin:0;font-weight:700;}
  .header h1 span{color:var(--accent);}
  .header .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  .header .live .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

  /* STATS ROW */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
  .stat b{font-family:'JetBrains Mono',monospace;font-size:24px;display:block;color:var(--accent);}
  .stat span{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

  /* SORT BAR */
  .sortbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .sortbar button{background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:8px 16px;
    font-size:13px;color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
  .sortbar button.active{background:var(--accent);color:#0D0E1C;border-color:var(--accent);font-weight:600;}
  .sortbar button:hover{border-color:var(--accent);}

  /* CARDS */
  .cards{display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;transition:border-color .25s;position:relative;overflow:hidden;}
  .card:hover{border-color:var(--accent);}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .card .info{flex:1;min-width:0;}
  .card h3{margin:0 0 4px;font-size:16px;font-weight:700;line-height:1.3;}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .card .tag{font-size:11px;padding:4px 10px;border-radius:99px;background:var(--surface);border:1px solid var(--line);
    color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .card .tag.dist{color:var(--accent);border-color:rgba(77,214,193,.3);}
  .card .tag.price{color:var(--warm);border-color:rgba(255,181,71,.3);}
  .card .tag.layout{color:var(--accent2);border-color:rgba(157,123,255,.3);}
  .card .tag.train{color:var(--accent2);border-color:rgba(157,123,255,.3);}
  .card .tag.affordable{color:var(--green);border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.08);}
  .card .tag.over{color:var(--hot);border-color:rgba(255,93,93,.2);opacity:.6;}
  .card .maplink{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;color:var(--accent);text-decoration:none;font-family:'JetBrains Mono',monospace;}
  .card .maplink:hover{text-decoration:underline;}
  .card.notaffordable{opacity:.6;}
  .card .pricebig.over{color:var(--hot);}
  .card .pricebig{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--warm);white-space:nowrap;}
  .card .pricebig small{font-size:11px;color:var(--faint);font-weight:400;}

  /* DISTANCE BAR */
  .distbar{margin-top:12px;height:6px;border-radius:99px;background:var(--surface);overflow:hidden;}
  .distbar .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s;}

  /* EMPTY / LOADING */
  .empty{text-align:center;padding:60px 20px;color:var(--faint);}
  .empty .icon{font-size:48px;display:block;margin-bottom:12px;}
  .empty p{font-size:14px;line-height:1.6;}

  /* FOOTER */
  footer{margin-top:30px;text-align:center;font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;}
  footer a{color:var(--accent);text-decoration:none;}

  /* LAST UPDATED */
  .updated{font-size:11px;color:var(--faint);font-family:'JetBrains Mono',monospace;margin-bottom:16px;}
</style>
</head>
<body>

<div class="header">
  <h1>JKK <span>Radar</span></h1>
  <div class="live"><div class="dot"></div> LIVE</div>
</div>

<div class="updated" id="updated"></div>

<div class="stats" id="stats"></div>

<div class="sortbar">
  <button class="active" data-sort="distance">📏 Distance</button>
  <button data-sort="price">💰 Price</button>
  <button data-sort="area">📍 Area</button>
  <button data-sort="size">📐 Size</button>
</div>

<div class="cards" id="cards"></div>

<footer>JKK Radar · <a href="https://github.com/garahan/jkk-radar">Source</a> · Updates every 15 min</footer>

<script>
let DATA=null, currentSort='distance';

async function loadData(){
  try{
    const r=await fetch('results.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA=await r.json();
    render();
  }catch(e){
    document.getElementById('cards').innerHTML=
      '<div class="empty"><span class="icon">📡</span><p>Waiting for first scan...<br>The scraper runs every 15 minutes.<br>Results will appear here automatically.</p></div>';
  }
}

function formatPrice(p){
  return '¥'+p.toLocaleString();
}

function timeAgo(iso){
  if(!iso) return '';
  const d=new Date(iso), now=new Date();
  const mins=Math.floor((now-d)/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+' min ago';
  const hrs=Math.floor(mins/60);
  if(hrs<24) return hrs+' hr ago';
  return Math.floor(hrs/24)+' days ago';
}

function render(){
  if(!DATA||!DATA.apartments||!DATA.apartments.length){
    document.getElementById('cards').innerHTML=
      '<div class="empty"><span class="icon">🔍</span><p>No apartments found in the last scan.</p></div>';
    return;
  }

  document.getElementById('updated').textContent='Last scan: '+timeAgo(DATA.last_updated)+' · '+DATA.total+' listings · '+DATA.affordable_count+' under ¥'+((DATA.max_rent||80000)/1000)+'k';

  // Stats
  const apts=DATA.apartments;
  const withDist=apts.filter(a=>a.distance_km!=null);
  const affordable=apts.filter(a=>a.affordable);
  const minPrice=Math.min(...apts.map(a=>a.price));
  const minDist=withDist.length?Math.min(...withDist.map(a=>a.distance_km)):null;

  document.getElementById('stats').innerHTML=`
    <div class="stat"><b>${apts.length}</b><span>Listings</span></div>
    <div class="stat"><b>${affordable.length}</b><span>Under ¥80k</span></div>
    <div class="stat"><b>${minDist!=null?minDist.toFixed(1)+'km':'—'}</b><span>Closest</span></div>
  `;

  // Sort
  let sorted=[...apts];
  if(currentSort==='distance') sorted.sort((a,b)=>(a.distance_km??999)-(b.distance_km??999));
  else if(currentSort==='price') sorted.sort((a,b)=>a.price-b.price);
  else if(currentSort==='area') sorted.sort((a,b)=>a.area.localeCompare(b.area));
  else if(currentSort==='size') sorted.sort((a,b)=>{
    const pa=parseFloat(a.floor_area)||0, pb=parseFloat(b.floor_area)||0;
    return pb-pa;
  });

  // Render cards
  const maxDist=50;
  const el=document.getElementById('cards');
  el.innerHTML=sorted.map(a=>{
    const distPct=a.distance_km!=null?Math.min(100,(a.distance_km/maxDist)*100):0;
    const overClass=a.affordable?'':' notaffordable';
    const priceClass=a.affordable?'':' over';
    return `<div class="card${overClass}">
      <div class="top">
        <div class="info">
          <h3>${a.name}</h3>
          <div class="meta">
            <span class="tag area">📍 ${a.area}</span>
            <span class="tag layout">🏠 ${a.layout}</span>
            <span class="tag">📐 ${a.floor_area}m²</span>
            ${a.distance_km!=null?`<span class="tag dist">📏 ${a.distance_km}km</span>`:''}
            ${a.train_min?`<span class="tag train">🚇 ~${a.train_min}min</span>`:''}
            ${a.affordable?`<span class="tag affordable">✓ ≤¥80k</span>`:`<span class="tag over">over ¥80k</span>`}
          </div>
        </div>
        <div class="pricebig${priceClass}">${formatPrice(a.price)}<small>/mo</small></div>
      </div>
      ${a.distance_km!=null?`<div class="distbar"><div class="fill" style="width:${distPct}%"></div></div>`:''}
      ${a.maps_url?`<a class="maplink" href="${a.maps_url}" target="_blank">🗺 View on Google Maps</a>`:''}
    </div>`;
  }).join('');
}

// Sort buttons
document.querySelectorAll('.sortbar button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.sortbar button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentSort=b.dataset.sort;
    render();
  });
});

loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
